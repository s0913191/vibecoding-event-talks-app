<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BigQuery Release Pulse - Latest Google BigQuery News</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="dark-theme">
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="brand">
                <div class="logo-container">
                    <i data-lucide="database" class="logo-icon"></i>
                    <div class="logo-glow"></div>
                </div>
                <div class="brand-text">
                    <h1>BQ Pulse</h1>
                    <span>Google BigQuery Updates</span>
                </div>
            </div>

            <!-- Stats Dashboard -->
            <div class="sidebar-section">
                <h3 class="section-title">Overview</h3>
                <div class="stats-grid">
                    <div class="stat-card">
                        <span class="stat-value" id="stat-total">0</span>
                        <span class="stat-label">Total Notes</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-value" id="stat-features">0</span>
                        <span class="stat-label">Features</span>
                    </div>
                </div>
            </div>

            <!-- Search and Filter Panel -->
            <div class="sidebar-section">
                <h3 class="section-title">Filters</h3>
                
                <!-- Search Bar -->
                <div class="search-box">
                    <i data-lucide="search" class="search-icon"></i>
                    <input type="text" id="search-input" placeholder="Search release notes..." autocomplete="off">
                    <button id="clear-search-btn" class="clear-btn" style="display: none;">
                        <i data-lucide="x"></i>
                    </button>
                </div>

                <!-- Category Filters -->
                <div class="filter-group">
                    <label class="group-label">Category</label>
                    <div class="filter-options">
                        <button class="filter-btn active" data-category="all">
                            <span class="dot"></span> All Updates
                        </button>
                        <button class="filter-btn" data-category="feature">
                            <span class="dot feature-dot"></span> Features
                        </button>
                        <button class="filter-btn" data-category="change">
                            <span class="dot change-dot"></span> Changes
                        </button>
                        <button class="filter-btn" data-category="fix">
                            <span class="dot fix-dot"></span> Fixes
                        </button>
                        <button class="filter-btn" data-category="deprecation">
                            <span class="dot deprecation-dot"></span> Deprecations
                        </button>
                    </div>
                </div>

                <!-- Date Range Filters -->
                <div class="filter-group">
                    <label class="group-label">Timeframe</label>
                    <div class="filter-options">
                        <button class="filter-btn active" data-timeframe="all">Anytime</button>
                        <button class="filter-btn" data-timeframe="7">Last 7 Days</button>
                        <button class="filter-btn" data-timeframe="30">Last 30 Days</button>
                        <button class="filter-btn" data-timeframe="90">Last 90 Days</button>
                    </div>
                </div>
            </div>

            <!-- Simulated Twitter Feed -->
            <div class="sidebar-section twitter-section">
                <div class="section-header">
                    <h3 class="section-title"><i data-lucide="twitter" class="twitter-icon-header"></i> Pulse Tweets</h3>
                    <span class="badge" id="tweet-count">0</span>
                </div>
                <div class="tweet-log-container" id="tweet-log">
                    <div class="empty-tweet-log">
                        <i data-lucide="send"></i>
                        <p>No tweets sent yet. Select an update and tweet it!</p>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <!-- Header/Navbar -->
            <header class="top-nav">
                <div class="nav-left">
                    <h2 class="feed-title" id="feed-title-display">BigQuery Release Notes</h2>
                    <div class="sync-status">
                        <span class="status-indicator online"></span>
                        <span id="sync-text">Loading feed...</span>
                    </div>
                </div>
                <div class="nav-right">
                    <button id="refresh-btn" class="btn btn-primary" title="Sync with Google Cloud Feed">
                        <i data-lucide="rotate-cw" class="icon-spin-target"></i>
                        <span>Sync Feed</span>
                    </button>
                </div>
            </header>

            <!-- Release Notes List Container -->
            <div class="content-scrollable">
                <div class="feed-container" id="release-notes-feed">
                    <!-- Skeleton Loader shown during initial fetch -->
                    <div class="skeleton-card">
                        <div class="skeleton-header">
                            <div class="skeleton-badge"></div>
                            <div class="skeleton-date"></div>
                        </div>
                        <div class="skeleton-title"></div>
                        <div class="skeleton-line"></div>
                        <div class="skeleton-line short"></div>
                        <div class="skeleton-footer"></div>
                    </div>
                    <div class="skeleton-card">
                        <div class="skeleton-header">
                            <div class="skeleton-badge"></div>
                            <div class="skeleton-date"></div>
                        </div>
                        <div class="skeleton-title"></div>
                        <div class="skeleton-line"></div>
                        <div class="skeleton-line short"></div>
                        <div class="skeleton-footer"></div>
                    </div>
                    <div class="skeleton-card">
                        <div class="skeleton-header">
                            <div class="skeleton-badge"></div>
                            <div class="skeleton-date"></div>
                        </div>
                        <div class="skeleton-title"></div>
                        <div class="skeleton-line"></div>
                        <div class="skeleton-line short"></div>
                        <div class="skeleton-footer"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Tweet Customizer Modal -->
    <div class="modal-overlay" id="tweet-modal">
        <div class="modal-card">
            <div class="modal-header">
                <div class="modal-header-title">
                    <i data-lucide="twitter" class="twitter-modal-icon"></i>
                    <h3>Draft Release Tweet</h3>
                </div>
                <button class="modal-close-btn" id="close-modal-btn">
                    <i data-lucide="x"></i>
                </button>
            </div>
            
            <div class="modal-body">
                <!-- Highlighted Release Summary -->
                <div class="release-preview-box">
                    <div class="preview-meta">
                        <span class="preview-badge" id="modal-preview-badge">Feature</span>
                        <span class="preview-date" id="modal-preview-date">June 15, 2026</span>
                    </div>
                    <p class="preview-text" id="modal-preview-text">Release note details summary...</p>
                </div>

                <!-- Template Selector -->
                <div class="template-selector">
                    <label class="modal-label">Choose Tweet Style</label>
                    <div class="template-buttons">
                        <button class="template-btn active" data-style="info">
                            <i data-lucide="info"></i> Standard
                        </button>
                        <button class="template-btn" data-style="hype">
                            <i data-lucide="zap"></i> Exciting
                        </button>
                        <button class="template-btn" data-style="dev">
                            <i data-lucide="terminal"></i> Developer
                        </button>
                    </div>
                </div>

                <!-- Tweet Edit Area -->
                <div class="tweet-editor-container">
                    <label for="tweet-textarea" class="modal-label">Customize Tweet Content</label>
                    <div class="textarea-wrapper">
                        <textarea id="tweet-textarea" maxlength="500" placeholder="What's happening?"></textarea>
                        <div class="editor-footer">
                            <span class="character-counter" id="char-counter">0 / 280</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="modal-footer">
                <button class="btn btn-secondary" id="modal-copy-btn">
                    <i data-lucide="copy"></i> Copy Text
                </button>
                <div class="modal-actions-right">
                    <button class="btn btn-accent" id="modal-simulate-btn">
                        <i data-lucide="send"></i> Post Internally
                    </button>
                    <a href="#" target="_blank" class="btn btn-primary" id="modal-tweet-btn">
                        <i data-lucide="external-link"></i> Tweet on X
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Notification Container -->
    <div class="toast-container" id="toast-container"></div>

    <script src="/static/js/app.js"></script>
</body>
</html>
